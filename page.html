<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempMailX Page</title>
    <meta name="description" content="TempMailX custom page.">
    <meta name="robots" content="index, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=14">
</head>
<body data-theme="dark">
    <header class="header">
        <div class="wrap header-inner">
            <a href="index.html" class="logo"><div class="logo-ico"><i class="fas fa-paper-plane"></i></div><span>Temp<span class="logo-p">Mail</span>X</span></a>
            <nav class="nav" id="mainNav"><a href="index.html" data-i18n="nav_home">Home</a><a href="index.html#inbox" data-i18n="nav_inbox">Inbox</a><a href="blog.html" data-i18n="nav_blog">Blog</a><a href="premium.html" data-i18n="nav_premium">Premium</a><a href="index.html#faq">FAQ</a></nav>
            <div class="header-right"><button class="theme-btn" id="themeBtn" title="Toggle Theme"><i class="fas fa-moon"></i></button><button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button></div>
        </div>
    </header>
    <main id="dynamicPageRoot"></main>
    <footer class="footer">
        <div class="wrap">
            <div class="foot-grid">
                <div class="foot-brand"><a href="index.html" class="logo"><div class="logo-ico"><i class="fas fa-paper-plane"></i></div><span>Temp<span class="logo-p">Mail</span>X</span></a><p>Free temporary email service for safer signups, quick OTP checks, and cleaner inboxes.</p></div>
                <div class="foot-links"><h4>Product</h4><a href="index.html#inbox">Inbox</a><a href="premium.html">Premium</a><a href="blog.html">Blog</a></div>
                <div class="foot-links"><h4>Use Cases</h4><a href="index.html#about">For users</a><a href="index.html#faq">FAQ</a><a href="premium.html">Business plans</a></div>
            </div>
            <div class="foot-bottom"><p>&copy; 2026 TempMailX. All rights reserved.</p></div>
        </div>
    </footer>
    <script src="js/site-content.js?v=1"></script>
    <script>
        const savedTheme = localStorage.getItem('tmx_theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);
        document.documentElement.setAttribute('data-theme', savedTheme);
        const themeBtn = document.getElementById('themeBtn');
        if (themeBtn) {
            themeBtn.addEventListener('click', function () {
                const current = document.documentElement.getAttribute('data-theme') || 'dark';
                const next = current === 'dark' ? 'light' : 'dark';
                document.body.setAttribute('data-theme', next);
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('tmx_theme', next);
                themeBtn.innerHTML = next === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });
        }
    </script>
</body>
</html>
